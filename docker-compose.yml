name: aegisops

x-python-service: &python-service
  build:
    context: .
    dockerfile: infrastructure/compose/python-service.Dockerfile
  env_file: .env.example
  networks:
    - aegisops
  depends_on:
    mongodb:
      condition: service_healthy

services:
  mongodb:
    image: mongo:7
    profiles: ["core", "observability", "intelligence", "demo", "dev"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegisops

  api-gateway:
    <<: *python-service
    profiles: ["core", "observability", "intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: apps/api-gateway
      AEGISOPS_SERVICE_NAME: api-gateway
    ports:
      - "8080:8080"

  demo-api:
    <<: *python-service
    profiles: ["core", "observability", "intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: apps/demo-api
      AEGISOPS_SERVICE_NAME: demo-api
    ports:
      - "8081:8080"

  order-service:
    <<: *python-service
    profiles: ["core", "observability", "intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: apps/order-service
      AEGISOPS_SERVICE_NAME: order-service
    ports:
      - "8082:8080"

  feature-service:
    <<: *python-service
    profiles: ["intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: services/feature-service
      AEGISOPS_SERVICE_NAME: feature-service

  anomaly-service:
    <<: *python-service
    profiles: ["intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: services/anomaly-service
      AEGISOPS_SERVICE_NAME: anomaly-service

  incident-service:
    <<: *python-service
    profiles: ["intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: services/incident-service
      AEGISOPS_SERVICE_NAME: incident-service

  rca-service:
    <<: *python-service
    profiles: ["intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: services/rca-service
      AEGISOPS_SERVICE_NAME: rca-service

  memory-service:
    <<: *python-service
    profiles: ["intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: services/memory-service
      AEGISOPS_SERVICE_NAME: memory-service

  recommendation-service:
    <<: *python-service
    profiles: ["intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: services/recommendation-service
      AEGISOPS_SERVICE_NAME: recommendation-service

  remediation-service:
    <<: *python-service
    profiles: ["intelligence", "demo", "dev"]
    environment:
      AEGISOPS_SERVICE_DIR: services/remediation-service
      AEGISOPS_SERVICE_NAME: remediation-service

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability", "intelligence", "demo", "dev"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aegisops

  grafana:
    image: grafana/grafana:11.1.4
    profiles: ["observability", "intelligence", "demo", "dev"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: aegisops
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - aegisops

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    profiles: ["observability", "intelligence", "demo", "dev"]
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./observability/otel/collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - aegisops

  loki:
    image: grafana/loki:3.1.1
    profiles: ["observability", "intelligence", "demo", "dev"]
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
    ports:
      - "3100:3100"
    networks:
      - aegisops

  tempo:
    image: grafana/tempo:2.6.0
    profiles: ["observability", "intelligence", "demo", "dev"]
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    ports:
      - "3200:3200"
      - "4319:4317"
    networks:
      - aegisops

  web-ui:
    build:
      context: apps/web-ui
      dockerfile: Dockerfile
    profiles: ["demo", "dev"]
    ports:
      - "5173:5173"
    environment:
      VITE_AEGISOPS_API_URL: http://localhost:8080
    networks:
      - aegisops

networks:
  aegisops:
    driver: bridge

volumes:
  mongodb-data:
  prometheus-data:
